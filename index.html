<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas de Alimentos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Controle de alimentos</h1>

      <form id="form-alimento">
        <h2>Adicionar alimento</h2>

        <div class="campos-formulario">
          <label>
            Nome
            <input id="nome" type="text" placeholder="Ex.: Mamão" required />
          </label>

          <label>
            Categoria
            <select id="categoria" required>
              <option value="frutas">Fruta</option>
              <option value="proteinas">Proteína</option>
            </select>
          </label>

          <label>
            Gramas por vez
            <input id="gramas" type="number" min="1" placeholder="Ex.: 100" required />
          </label>

          <label>
            Vezes por dia
            <select id="vezes" required>
              <option value="1">1 vez</option>
              <option value="2">2 vezes</option>
            </select>
          </label>

          <button type="submit">Adicionar</button>
        </div>
        <p id="mensagem" aria-live="polite"></p>
      </form>

      <section class="secao-tabela" data-categoria="frutas">
        <h2>Tabela de Frutas</h2>
        <div class="controles">
          <label>
            Filtrar por consumo:
            <select class="filtro-consumo">
              <option value="todos">Todos</option>
              <option value="1">1 vez</option>
              <option value="2">2 vezes</option>
            </select>
          </label>
        </div>
        <div class="tabela-responsiva">
          <table>
            <thead>
              <tr>
                <th>Fruta</th>
                <th><button class="ordenar-gramas" type="button">Gramas por vez ↕</button></th>
                <th>Consumo por dia</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="total"></p>
      </section>

      <section class="secao-tabela" data-categoria="proteinas">
        <h2>Tabela de Proteínas</h2>
        <div class="controles">
          <label>
            Filtrar por consumo:
            <select class="filtro-consumo">
              <option value="todos">Todos</option>
              <option value="1">1 vez</option>
              <option value="2">2 vezes</option>
            </select>
          </label>
        </div>
        <div class="tabela-responsiva">
          <table>
            <thead>
              <tr>
                <th>Proteína</th>
                <th><button class="ordenar-gramas" type="button">Gramas por vez ↕</button></th>
                <th>Consumo por dia</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="total"></p>
      </section>
    </main>

    <script src="Script.js"></script>
  </body>
</html>
